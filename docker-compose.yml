version: '3.8'

services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BOT_TOKEN=${BOT_TOKEN:?Discord Token is required}
      # 若要使用 /rcon-forward-channel 功能需設定（openssl rand -hex 32）；其他功能不需要
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Bot 持有者的 Discord user id（僅此 id 可透過私訊 bot 取得 admin 登入連結）
      # 未設定時 /api/* 不啟用驗證（僅本機 dev 暫用）
      - BOT_OWNER_ID=${BOT_OWNER_ID:-}
      # 前端對外網址，bot 私訊回傳的登入連結會以此為 base
      # TLS 由 caddy 終結，這裡請填 https://${DOMAIN}:${WEB_PORT}
      - WEB_BASE_URL=${WEB_BASE_URL:-}
    expose:
      - "3000"
    volumes:
      - karyl-chan-data:/usr/src/app/data

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - bot
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
      - ACME_EMAIL=${ACME_EMAIL:?ACME_EMAIL is required}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}
      - WEB_PORT=${WEB_PORT:-902}
    ports:
      - "${WEB_PORT:-902}:${WEB_PORT:-902}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  karyl-chan-data:
  caddy-data:
  caddy-config:
