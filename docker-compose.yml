version: '3.8'

services:
  bot:
    image: karyl-chan-bot:latest
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BOT_TOKEN=${BOT_TOKEN:?Discord Token is required}
      # 若要使用 /rcon-forward-channel 功能需設定（openssl rand -hex 32）；其他功能不需要
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Bot 持有者的 Discord user id（僅此 id 可透過私訊 bot 取得 admin 登入連結）
      # 未設定時 /api/* 不啟用驗證（僅本機 dev 暫用）
      - BOT_OWNER_ID=${BOT_OWNER_ID:-}
      # 前端對外網址，bot 私訊回傳的登入連結會以此為 base
      - WEB_BASE_URL=${WEB_BASE_URL:-}
      # container 內固定聽 3000，host 用 WEB_PORT 對映出去
      - WEB_PORT=3000
      # host 的 CERTS_DIR 會 mount 到 /certs，底下須有 fullchain.pem 與 privkey.pem
      - SSL_CERT_PATH=/certs/fullchain.pem
      - SSL_KEY_PATH=/certs/privkey.pem
    ports:
      - "${WEB_PORT:-902}:3000"
    volumes:
      - karyl-chan-data:/usr/src/app/data
      - ${CERTS_DIR:?CERTS_DIR is required (host absolute path to cert dir)}:/certs:ro

volumes:
  karyl-chan-data:
