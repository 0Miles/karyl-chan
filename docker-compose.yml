# Local docker test deployment of karyl-chan.
#
# This compose file is the docker-based counterpart to `npm run dev`:
# build the bot from the current source, run it as a container, and
# expose it on the host so sibling test projects can interact with
# it. Plain HTTP — see the comment block at the bottom for HTTPS
# deployment.
#
# Usage
# -----
#
#   # 1. One-time per host: create the shared network. Sibling
#   #    projects join it as `external: true` so they can resolve
#   #    karyl-chan by its container name.
#   docker network create karyl-chan-net
#
#   # 2. Build & run from the local source tree.
#   docker compose up --build
#
#   # 3. Wipe the SQLite volume for a clean slate.
#   docker compose down -v
#
# Sibling project snippet
# -----------------------
#
#   services:
#     my-webhook-server:
#       networks: [karyl-chan-net]
#   networks:
#     karyl-chan-net:
#       external: true
#
# karyl-chan can then POST to http://my-webhook-server:<port>/... and
# my-webhook-server can POST back to http://karyl-chan:3000/... .

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: karyl-chan-bot:local
    container_name: karyl-chan
    env_file:
      - .env
    environment:
      # `development` here gates two behaviours in src/modules/web-core/server.ts:
      # the BOT_OWNER_ID enforcement and the log level. Default to dev
      # so the local container can boot with BOT_OWNER_ID unset for
      # quick API poking from a sibling project.
      - NODE_ENV=${NODE_ENV:-development}
      - BOT_TOKEN=${BOT_TOKEN:?Discord Token is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BOT_OWNER_ID=${BOT_OWNER_ID:-}
      - KARYL_PLUGIN_SECRET=${KARYL_PLUGIN_SECRET:-}
      # The DM login link's base URL. Derived from WEB_PORT so a
      # developer clicking the link in Discord on the same machine
      # lands on this container's port mapping. We deliberately do NOT
      # forward host-side WEB_BASE_URL: that variable's `npm run dev`
      # value (vite on 5173) would override the docker mapping (902).
      # Override via docker-compose.override.yml if you front this with
      # a reverse proxy / tunnel.
      - WEB_BASE_URL=http://localhost:${WEB_PORT:-902}
      # Container internal port stays 3000; host mapping below is
      # what external callers and the host browser hit.
      - WEB_PORT=3000
    ports:
      - "${WEB_PORT:-902}:3000"
    volumes:
      # Bind-mount the project's ./data directory so dev (npm run dev)
      # and the docker bot share the exact same SQLite file. Container
      # `node` user is uid=1000, matching most local users; if your host
      # uid differs, adjust ownership of ./data accordingly or fall back
      # to a named volume.
      - ./data:/usr/src/app/data
    networks:
      - karyl-chan-net
    restart: unless-stopped
    # Give the in-process gracefulShutdown 30s budget room before docker
    # SIGKILLs us; main.ts SHUTDOWN_TIMEOUT_MS is 30_000.
    stop_grace_period: 35s
    healthcheck:
      # Pure-node healthcheck — the runtime image doesn't ship curl
      # or wget, but node itself is always available. Sibling projects
      # can `depends_on: { karyl-chan: { condition: service_healthy } }`
      # so they don't fire requests at a half-booted bot. We probe
      # /api/health/ready (not /api/health) so "healthy" means the
      # full boot path completed — migrations + DB + Discord gateway.
      # /api/health stays as a liveness alias for any older clients.
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:3000/api/health/ready',
          r => process.exit(r.statusCode === 200 ? 0 : 1))
          .on('error', () => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      # Longer start_period — Discord gateway handshake + guild fetch
      # can take 30-60s after the web server already accepts requests.
      start_period: 90s


networks:
  # External so `docker compose down` doesn't tear it down and break
  # neighbouring projects that have it mounted. Created once per host
  # via `docker network create karyl-chan-net`.
  karyl-chan-net:
    external: true
    name: karyl-chan-net

# --- HTTPS notes ---
#
# Local testing runs HTTP. If you want to test the TLS code path
# (e.g. validating a real cert chain) add a docker-compose.override.yml
# alongside this file:
#
#   services:
#     bot:
#       environment:
#         - SSL_CERT_PATH=/certs/fullchain.pem
#         - SSL_KEY_PATH=/certs/privkey.pem
#       volumes:
#         - ${CERTS_DIR}:/certs:ro
#
# `docker compose up` automatically merges docker-compose.override.yml
# on top of this file, so the override is picked up without a
# `-f` flag. The acme.sh + Cloudflare DNS-01 setup that produces
# fullchain.pem / privkey.pem is documented in .env.example.
